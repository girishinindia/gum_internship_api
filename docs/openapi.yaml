      x-required-roles: [student]
      parameters:
        - { name: quizId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: enrollmentId, in: query, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Quiz' } }
    patch:
      tags: [Quizzes]
      summary: Update quiz settings / publish
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: quizId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                passPercent: { type: number }
                timeLimitMinutes: { type: integer }
                maxAttempts: { type: integer }
                shuffleQuestions: { type: boolean }
                isPublished: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /quizzes/{quizId}/questions:
    post:
      tags: [Quizzes]
      summary: Add question
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: quizId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuizQuestionCreate' }
      responses:
        '201': { $ref: '#/components/responses/OkMessage' }
  /questions/{questionId}:
    patch:
      tags: [Quizzes]
      summary: Update question
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: questionId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuizQuestionCreate' }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
    delete:
      tags: [Quizzes]
      summary: Delete question (409 if attempts exist)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: questionId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '409': { $ref: '#/components/responses/Conflict' }
  /quizzes/{quizId}/attempts:
    post:
      tags: [Quizzes]
      summary: Start attempt (409 ATTEMPTS_EXHAUSTED when maxed)
      x-required-roles: [student]
      parameters:
        - { name: quizId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollmentId]
              properties:
                enrollmentId: { type: integer, format: int64 }
      responses:
        '201':
          description: Attempt started with questions (shuffled if configured)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/QuizAttempt' } }
        '409': { $ref: '#/components/responses/Conflict' }
  /attempts/{attemptId}/answers:
    put:
      tags: [Quizzes]
      summary: Autosave answers map {questionId:[optionIds]}
      x-required-roles: [student]
      parameters:
        - { name: attemptId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers: { type: object, additionalProperties: { type: array, items: { type: string } } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '410': { description: 'Attempt expired (auto-submitted)', content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
  /attempts/{attemptId}/submit:
    post:
      tags: [Quizzes]
