openapi: 3.1.0
info:
  title: GUM Internships API
  version: 1.0.0
  description: >
    MVP API contract. Every response uses the envelope {success, data, error, meta}.
    DB is snake_case; this API is camelCase. Auth = Bearer JWT (access 15m, refresh 30d).
    Pagination on list endpoints: ?page=&limit= (default 20, max 100).
    Endpoints marked "Public" need no token. x-required-roles lists allowed roles.
servers:
  - url: https://api.gum-internships.example.com/v1
    description: Production
  - url: https://staging-api.gum-internships.example.com/v1
    description: Staging
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Registration, login, OTP, sessions
  - name: Users
    description: Own profile, preferences, devices
  - name: Instructor
    description: Instructor application and own profile
  - name: Catalog
    description: Public browse (no auth)
  - name: Internships
    description: Instructor authoring (internships, sections, lessons)
  - name: Batches
    description: Cohort management
  - name: Enrollments
    description: Enroll, my learning, drop
  - name: Learning
    description: Playback and progress
  - name: Live Sessions
    description: Scheduling, join, attendance
  - name: Commerce
    description: Orders, coupons, invoices, refunds, Razorpay webhook
  - name: Projects & Submissions
    description: Projects, weekly tasks, submissions, mentor reviews
  - name: Quizzes
    description: Quiz authoring and attempts
  - name: Certificates
    description: Claim, download, public verification
  - name: Notifications
    description: In-app feed and read state
  - name: Instructor Finance
    description: Earnings and settlements (instructor view)
  - name: Support
    description: Support tickets (user side)
  - name: Admin
    description: Moderation, users, finance, reports, CMS, audit

paths:
  # ============================================================ AUTH
  /auth/register:
    post:
      tags: [Auth]
      summary: Register (student) — account starts pending_verification; OTP sent to email AND phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, phone, password]
              properties:
                fullName: { type: string, minLength: 2 }
                email: { type: string, format: email }
                phone: { type: string, description: 'Indian mobile; 10 digits or +91…' }
                password: { type: string, minLength: 8, description: 'Min 8 chars, letter + number' }
                track: { type: string, enum: [education, employed] }
                marketingConsent: { type: boolean, default: false }
      responses:
        '201':
          description: Created — verify email or phone to activate
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          userId: { type: integer, format: int64 }
                          verificationRequired: { type: boolean, const: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email OR phone + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password]
              properties:
                identifier: { type: string, description: Email or phone }
                password: { type: string }
      responses:
        '200': { $ref: '#/components/responses/AuthTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request/resend OTP — 60s cooldown + 3/hour per identifier (enforced server-side)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination, channel, purpose]
              properties:
                destination: { type: string, description: Phone (+91…) or email }
                channel: { type: string, enum: [sms, email] }
                purpose: { type: string, enum: [email_verify, phone_verify, password_reset] }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify email/phone OTP — first verified channel activates the account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination, purpose, code]
              properties:
                destination: { type: string }
                purpose: { type: string, enum: [email_verify, phone_verify] }
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '410': { description: OTP expired/attempts exhausted, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token, get new pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200': { $ref: '#/components/responses/AuthTokensResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /auth/password/forgot:
    post:
      tags: [Auth]
      summary: Send password-reset link (always 200 to avoid enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Set new password with the emailed OTP; revokes ALL sessions
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email: { type: string, format: email }
                code: { type: string, minLength: 6, maxLength: 6 }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '410': { description: Code expired/attempts exhausted, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
  /auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (authenticated) — revokes all other sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke every session for the current user
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /auth/email/verify:
    post:
      tags: [Auth]
      summary: Verify email with emailed token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }

  # ============================================================ USERS
  /users/me:
    get:
      tags: [Users]
      summary: Own profile with roles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/UserMe' } }
    patch:
      tags: [Users]
      summary: Update own profile (name, avatarUrl)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                avatarUrl: { type: string }
                track: { type: string, enum: [education, employed] }
                resumeUrl: { type: string }
                marketingConsent: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/UserMe' } }
  /users/me/avatar-upload-url:
    post:
      tags: [Users]
      summary: Get presigned Bunny Storage upload URL for avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType]
              properties:
                fileName: { type: string }
                contentType: { type: string }
      responses:
        '200': { $ref: '#/components/responses/UploadUrlResponse' }
  /users/me/notification-preferences:
    get:
      tags: [Users]
      summary: Own notification preferences
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/NotificationPreference' } }
    put:
      tags: [Users]
      summary: Replace preferences (transactional cannot be disabled)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/NotificationPreference' }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /users/me/device-tokens:
    post:
      tags: [Users]
      summary: Register FCM device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token: { type: string }
                platform: { type: string, enum: [android, ios, web] }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }

  # ============================================================ INSTRUCTOR ONBOARDING
  /users/instructor-application:
    get:
      tags: [Instructor]
      summary: Own instructor application/profile (any state)
      x-required-roles: [student, instructor]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/InstructorProfile' } }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Instructor]
      summary: Apply as external instructor (KYC submitted; re-apply allowed after rejection)
      x-required-roles: [student]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorApplication'
      responses:
        '201':
          description: Submitted (PAN/bank stored encrypted; only last4 ever returned)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/InstructorProfile' } }
        '409': { $ref: '#/components/responses/Conflict' }
  /instructor/agreement/accept:
    post:
      tags: [Instructor]
      summary: Record agreement acceptance (required before submit-for-review)
      x-required-roles: [instructor]
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }

  # ============================================================ CATALOG (PUBLIC)
  /catalog/internships:
    get:
      tags: [Catalog]
      summary: 'Public: browse published internships'
      security: []
      parameters:
        - { name: category, in: query, schema: { type: string }, description: Category slug }
        - { name: pricingType, in: query, schema: { type: string, enum: [free, paid, stipend] } }
        - { name: deliveryMode, in: query, schema: { type: string, enum: [recorded, live, hybrid, project_only] } }
        - { name: language, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string }, description: Free-text title search }
        - { name: sort, in: query, schema: { type: string, enum: [newest, price_asc, price_desc], default: newest } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/InternshipSummary' } }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
  /catalog/internships/{slug}:
    get:
      tags: [Catalog]
      summary: 'Public: internship detail (outline only; preview lessons playable)'
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/InternshipDetail' } }
        '404': { $ref: '#/components/responses/NotFound' }
  /catalog/categories:
    get:
      tags: [Catalog]
      summary: 'Public: active categories'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Category' } }
  /catalog/banners:
    get:
      tags: [Catalog]
      summary: 'Public: live banners by placement'
      security: []
      parameters:
        - { name: placement, in: query, schema: { type: string, enum: [home_hero, home_strip, category_page] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Banner' } }
  /catalog/pages/{slug}:
    get:
      tags: [Catalog]
      summary: 'Public: published CMS page'
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/CmsPage' } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ============================================================ INTERNSHIP AUTHORING
  /internships:
    get:
      tags: [Internships]
      summary: List own internships (any status)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [draft, pending_review, published, rejected, archived] } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Internship' } }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Internships]
      summary: Create internship draft
      x-required-roles: [instructor, moderator, super_admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InternshipCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Internship' } }
        '400': { $ref: '#/components/responses/ValidationError' }
  /internships/{internshipId}:
    parameters:
      - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Internships]
      summary: Own internship detail incl. full curriculum
      x-required-roles: [instructor, moderator, super_admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Internship' } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Internships]
      summary: Update own internship (drafts freely; published = safe fields only)
      x-required-roles: [instructor, moderator, super_admin]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InternshipCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Internship' } }
  /internships/{internshipId}/submit-for-review:
    post:
      tags: [Internships]
      summary: draft → pending_review (requires signed agreement, ≥1 lesson, ≥1 task)
      x-required-roles: [instructor]
      parameters:
        - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '409': { $ref: '#/components/responses/Conflict' }
  /internships/{internshipId}/archive:
    post:
      tags: [Internships]
      summary: Archive (hidden from catalog; learners keep access)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /internships/{internshipId}/sections:
    post:
      tags: [Internships]
      summary: Add curriculum section
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                displayOrder: { type: integer }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Section' } }
  /internships/{internshipId}/sections/reorder:
    put:
      tags: [Internships]
      summary: Reorder sections (array of sectionIds in new order)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sectionIds]
              properties:
                sectionIds: { type: array, items: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /sections/{sectionId}:
    patch:
      tags: [Internships]
      summary: Update section title/order
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: sectionId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                displayOrder: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
    delete:
      tags: [Internships]
      summary: Delete empty section (409 if it has lessons)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: sectionId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '409': { $ref: '#/components/responses/Conflict' }
  /sections/{sectionId}/lessons:
    post:
      tags: [Internships]
      summary: Add lesson (video|live|document|quiz)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: sectionId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type]
              properties:
                title: { type: string }
                type: { type: string, enum: [video, live, document, quiz] }
                documentUrl: { type: string }
                quizId: { type: integer, format: int64 }
                isPreview: { type: boolean, default: false }
                isMandatory: { type: boolean, default: true }
                displayOrder: { type: integer }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Lesson' } }
  /lessons/{lessonId}:
    patch:
      tags: [Internships]
      summary: Update lesson
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                documentUrl: { type: string }
                isPreview: { type: boolean }
                isMandatory: { type: boolean }
                displayOrder: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
    delete:
      tags: [Internships]
      summary: Delete lesson (409 if learner progress exists — archive instead)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '409': { $ref: '#/components/responses/Conflict' }
  /lessons/{lessonId}/video-upload:
    post:
      tags: [Internships]
      summary: Create Bunny Stream video + return TUS upload credentials
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: Upload target
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          bunnyVideoId: { type: string }
                          tusEndpoint: { type: string }
                          authorizationSignature: { type: string }
                          authorizationExpire: { type: integer }
                          libraryId: { type: string }

  # ============================================================ BATCHES
  /internships/{internshipId}/batches:
    parameters:
      - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Batches]
      summary: List batches of an internship
      x-required-roles: [instructor, moderator, super_admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Batch' } }
    post:
      tags: [Batches]
      summary: Create batch
      x-required-roles: [instructor, moderator, super_admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Batch' } }
  /batches/{batchId}:
    patch:
      tags: [Batches]
      summary: Update batch (seats, dates, status)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: batchId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
