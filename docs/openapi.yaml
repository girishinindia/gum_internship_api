      x-required-roles: [student]
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollmentId, fileName, contentType]
              properties:
                enrollmentId: { type: integer, format: int64 }
                fileName: { type: string }
                contentType: { type: string }
      responses:
        '200': { $ref: '#/components/responses/UploadUrlResponse' }
  /tasks/{taskId}/submissions:
    post:
      tags: [Projects & Submissions]
