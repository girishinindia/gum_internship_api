  /internships/{internshipId}/projects:
    parameters:
      - { name: internshipId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Projects & Submissions]
      summary: Projects with tasks (instructor view)
      x-required-roles: [instructor, moderator, super_admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Project' } }
    post:
      tags: [Projects & Submissions]
      summary: Create project
      x-required-roles: [instructor, moderator, super_admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Project' } }
  /projects/{projectId}/tasks:
    post:
      tags: [Projects & Submissions]
      summary: Add weekly task (rubric JSON, allowed submission types)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [weekNumber, title]
              properties:
                weekNumber: { type: integer, minimum: 1 }
                title: { type: string }
                instructions: { type: string }
                allowedSubmissionTypes: { type: array, items: { type: string, enum: [file, github_url, live_url] } }
                maxScore: { type: number, default: 100 }
                rubric: { type: array, items: { type: object, properties: { criterion: { type: string }, weight: { type: number }, maxPoints: { type: number } } } }
                dueOffsetDays: { type: integer, minimum: 0 }
                isMandatory: { type: boolean, default: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/ProjectTask' } }
  /tasks/{taskId}:
    patch:
      tags: [Projects & Submissions]
      summary: Update task
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
    delete:
      tags: [Projects & Submissions]
      summary: Delete task (409 if submissions exist)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
        '409': { $ref: '#/components/responses/Conflict' }
