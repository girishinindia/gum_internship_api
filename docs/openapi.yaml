        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Banner' } }
    post:
      tags: [Admin]
      summary: Create banner
      x-required-roles: [moderator, super_admin]
      requestBody:
        required: true
