  /admin/cms/banners/{bannerId}:
    patch:
      tags: [Admin]
      summary: Update/deactivate banner
      x-required-roles: [moderator, super_admin]
      parameters:
        - { name: bannerId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
    delete:
      tags: [Admin]
      summary: Delete banner
      x-required-roles: [moderator, super_admin]
      parameters:
        - { name: bannerId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }
  /admin/cms/pages:
    get:
      tags: [Admin]
      summary: All CMS pages
      x-required-roles: [moderator, super_admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/CmsPage' } }
    post:
      tags: [Admin]
      summary: Create page
      x-required-roles: [moderator, super_admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title, contentMd]
              properties:
                slug: { type: string }
                title: { type: string }
                contentMd: { type: string }
                metaTitle: { type: string }
                metaDescription: { type: string }
                isPublished: { type: boolean, default: false }
      responses:
        '201': { $ref: '#/components/responses/OkMessage' }
  /admin/cms/pages/{pageId}:
    patch:
      tags: [Admin]
      summary: Update/publish page
      x-required-roles: [moderator, super_admin]
      parameters:
        - { name: pageId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    OkMessage:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Envelope'
              - properties:
                  data:
                    type: object
                    properties: { message: { type: string } }
    AuthTokensResponse:
      description: Tokens issued
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Envelope'
              - properties: { data: { $ref: '#/components/schemas/AuthTokens' } }
    UploadUrlResponse:
      description: Presigned upload target
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Envelope'
              - properties:
                  data:
                    type: object
                    properties:
                      uploadUrl: { type: string }
                      publicUrl: { type: string }
                      headers: { type: object, additionalProperties: { type: string } }
                      expiresAt: { type: string, format: date-time }
    ValidationError:
      description: 'Request failed zod validation (error.code=VALIDATION_ERROR)'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: 'Missing/invalid token (error.code=UNAUTHORIZED)'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: 'Role/ownership check failed (error.code=FORBIDDEN)'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: 'Resource not found (error.code=NOT_FOUND)'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: 'State conflict, e.g. ALREADY_ENROLLED, BATCH_FULL, SUBMISSION_PENDING_REVIEW'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: 'Too many requests (error.code=RATE_LIMITED)'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    Envelope:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, const: true }
        data: {}
        error: { type: 'null' }
        meta: { type: object }
    ErrorEnvelope:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, const: false }
        data: { type: 'null' }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: 'Stable machine code, e.g. VALIDATION_ERROR, FORBIDDEN, BATCH_FULL' }
            message: { type: string }
            details: { description: Optional zod issue list }
    PaginationMeta:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
            totalPages: { type: integer }
    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, description: Access token TTL seconds }
        user: { $ref: '#/components/schemas/UserMe' }
    UserMe:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: [string, 'null'], format: email }
        phone: { type: [string, 'null'] }
        fullName: { type: string }
        avatarUrl: { type: [string, 'null'] }
        status: { type: string, enum: [active, suspended, deleted, pending_verification] }
        emailVerified: { type: boolean }
        phoneVerified: { type: boolean }
        track: { type: [string, 'null'], enum: [education, employed, null] }
        resumeUrl: { type: [string, 'null'] }
        roles: { type: array, items: { type: string, enum: [student, instructor, moderator, finance_admin, support, super_admin] } }
        createdAt: { type: string, format: date-time }
    InstructorApplication:
      type: object
      required: [bio, expertise, panNumber, bankAccountName, bankAccountNumber, bankIfsc]
      properties:
        bio: { type: string }
        expertise: { type: array, items: { type: string } }
        linkedinUrl: { type: string }
        websiteUrl: { type: string }
        panNumber: { type: string, description: Encrypted at rest }
        gstin: { type: [string, 'null'] }
        bankAccountName: { type: string }
        bankAccountNumber: { type: string, description: Encrypted at rest; only last4 ever returned }
        bankIfsc: { type: string }
        kycDocuments: { type: array, items: { type: object, properties: { type: { type: string }, bunnyPath: { type: string } } } }
    InstructorProfile:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        instructorType: { type: string, enum: [internal, external] }
        bio: { type: [string, 'null'] }
        expertise: { type: array, items: { type: string } }
        kycStatus: { type: string, enum: [pending, submitted, approved, rejected] }
        agreementStatus: { type: string, enum: [pending, sent, signed] }
        revenueSharePercent: { type: number }
        bankAccountLast4: { type: [string, 'null'] }
        rejectionReason: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    Category:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        iconUrl: { type: [string, 'null'] }
        displayOrder: { type: integer }
    InternshipSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        slug: { type: string }
        shortDescription: { type: [string, 'null'] }
        category: { $ref: '#/components/schemas/Category' }
        pricingType: { type: string, enum: [free, paid, stipend] }
        price: { type: number }
        currency: { type: string }
        deliveryMode: { type: string, enum: [recorded, live, hybrid, project_only] }
        paceType: { type: string, enum: [batch, self_paced] }
        durationWeeks: { type: [integer, 'null'] }
        languages: { type: array, items: { type: string } }
        thumbnailUrl: { type: [string, 'null'] }
        instructorName: { type: string }
        publishedAt: { type: [string, 'null'], format: date-time }
    InternshipDetail:
      allOf:
        - $ref: '#/components/schemas/InternshipSummary'
        - type: object
          properties:
            description: { type: [string, 'null'] }
            outcomes: { type: array, items: { type: string } }
            prerequisites: { type: array, items: { type: string } }
            gstRate: { type: number }
            totalWithGst: { type: number, description: Server-computed display price }
            certificateRules: { type: object }
            curriculum:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  title: { type: string }
                  lessons:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer, format: int64 }
                        title: { type: string }
                        type: { type: string, enum: [video, live, document, quiz] }
                        durationMinutes: { type: [integer, 'null'] }
                        isPreview: { type: boolean }
            upcomingBatches: { type: array, items: { $ref: '#/components/schemas/Batch' } }
            instructor: { type: object, properties: { name: { type: string }, bio: { type: [string, 'null'] }, expertise: { type: array, items: { type: string } } } }
    InternshipCreate:
      type: object
      required: [title, categoryId, pricingType, deliveryMode, paceType]
      properties:
        title: { type: string, minLength: 5 }
        categoryId: { type: integer, format: int64 }
        shortDescription: { type: string }
        description: { type: string }
        outcomes: { type: array, items: { type: string } }
        prerequisites: { type: array, items: { type: string } }
        languages: { type: array, items: { type: string } }
        pricingType: { type: string, enum: [free, paid] , description: stipend reserved for P2 }
        price: { type: number, minimum: 0 }
        deliveryMode: { type: string, enum: [recorded, live, hybrid, project_only] }
        paceType: { type: string, enum: [batch, self_paced] }
        durationWeeks: { type: integer, minimum: 1 }
        thumbnailUrl: { type: string }
        certificateRules: { type: object }
    Internship:
      allOf:
        - $ref: '#/components/schemas/InternshipSummary'
        - type: object
          properties:
            status: { type: string, enum: [draft, pending_review, published, rejected, archived] }
            providerType: { type: string, enum: [system, external] }
            rejectionReason: { type: [string, 'null'] }
            certificateRules: { type: object }
            createdAt: { type: string, format: date-time }
    Batch:
      type: object
      properties:
        id: { type: integer, format: int64 }
        internshipId: { type: integer, format: int64 }
        name: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        enrollmentDeadline: { type: [string, 'null'], format: date-time }
        seatsTotal: { type: integer }
        seatsFilled: { type: integer }
        seatsLeft: { type: integer }
        waitlistEnabled: { type: boolean }
        status: { type: string, enum: [scheduled, enrolling, ongoing, completed, cancelled] }
    BatchCreate:
      type: object
      required: [name, startDate, endDate, seatsTotal]
      properties:
        name: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        enrollmentDeadline: { type: string, format: date-time }
        seatsTotal: { type: integer, minimum: 1 }
        waitlistEnabled: { type: boolean, default: false }
        waitlistLimit: { type: integer, minimum: 1 }
    Section:
      type: object
      properties:
        id: { type: integer, format: int64 }
        internshipId: { type: integer, format: int64 }
        title: { type: string }
        displayOrder: { type: integer }
        lessons: { type: array, items: { $ref: '#/components/schemas/Lesson' } }
    Lesson:
      type: object
      properties:
        id: { type: integer, format: int64 }
        sectionId: { type: integer, format: int64 }
        title: { type: string }
        type: { type: string, enum: [video, live, document, quiz] }
        displayOrder: { type: integer }
        durationMinutes: { type: [integer, 'null'] }
        videoStatus: { type: [string, 'null'], enum: [uploading, processing, ready, failed, null] }
        documentUrl: { type: [string, 'null'] }
        quizId: { type: [integer, 'null'], format: int64 }
        isPreview: { type: boolean }
        isMandatory: { type: boolean }
    LiveSession:
      type: object
      properties:
        id: { type: integer, format: int64 }
        internshipId: { type: integer, format: int64 }
        batchId: { type: [integer, 'null'], format: int64 }
        lessonId: { type: [integer, 'null'], format: int64 }
        provider: { type: string, enum: [zoom, google_meet] }
        title: { type: string }
        scheduledStart: { type: string, format: date-time }
        scheduledEnd: { type: string, format: date-time }
        status: { type: string, enum: [scheduled, live, completed, cancelled] }
        recordingLessonId: { type: [integer, 'null'], format: int64 }
    Enrollment:
      type: object
      properties:
        id: { type: integer, format: int64 }
        internship: { $ref: '#/components/schemas/InternshipSummary' }
        batch: { oneOf: [{ $ref: '#/components/schemas/Batch' }, { type: 'null' }] }
        status: { type: string, enum: [pending_payment, waitlisted, active, completed, dropped, suspended] }
        progressPercent: { type: number }
        waitlistPosition: { type: [integer, 'null'] }
        enrolledAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        certificateId: { type: [integer, 'null'], format: int64 }
    LessonProgress:
      type: object
      properties:
        lessonId: { type: integer, format: int64 }
        status: { type: string, enum: [not_started, in_progress, completed] }
        watchedSeconds: { type: integer }
        completedAt: { type: [string, 'null'], format: date-time }
    Order:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderNo: { type: string }
        internshipId: { type: integer, format: int64 }
        batchId: { type: [integer, 'null'], format: int64 }
        subtotal: { type: number }
        discountAmount: { type: number }
        taxableAmount: { type: number }
        gstRate: { type: number }
        gstAmount: { type: number }
        totalAmount: { type: number }
        currency: { type: string }
        status: { type: string, enum: [created, pending, paid, failed, refunded, cancelled] }
        razorpayOrderId: { type: [string, 'null'] }
        invoiceNo: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    OrderCreate:
      type: object
      required: [internshipId, billingName, billingEmail, billingPhone, billingState]
      properties:
        internshipId: { type: integer, format: int64 }
        batchId: { type: integer, format: int64 }
        couponCode: { type: string }
        billingName: { type: string }
        billingEmail: { type: string, format: email }
        billingPhone: { type: string }
        billingState: { type: string, description: GST place of supply }
        billingGstin: { type: string }
    CheckoutParams:
      type: object
      description: Params for Razorpay Checkout.js on web
      properties:
        order: { $ref: '#/components/schemas/Order' }
        razorpayKeyId: { type: string }
        razorpayOrderId: { type: string }
        amountPaise: { type: integer }
        currency: { type: string }
        prefill: { type: object, properties: { name: { type: string }, email: { type: string }, contact: { type: string } } }
    CouponValidation:
      type: object
      properties:
        valid: { type: boolean }
        code: { type: string }
        discountAmount: { type: number }
        finalTotal: { type: number }
        reason: { type: [string, 'null'], description: Why invalid, when valid=false }
    Refund:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderId: { type: integer, format: int64 }
        amount: { type: number }
        reason: { type: [string, 'null'] }
        status: { type: string, enum: [requested, approved, rejected, processed] }
        createdAt: { type: string, format: date-time }
    Project:
      type: object
      properties:
        id: { type: integer, format: int64 }
        internshipId: { type: integer, format: int64 }
        title: { type: string }
        description: { type: [string, 'null'] }
        tasks: { type: array, items: { $ref: '#/components/schemas/ProjectTask' } }
    ProjectTask:
      type: object
      properties:
        id: { type: integer, format: int64 }
        projectId: { type: integer, format: int64 }
        weekNumber: { type: integer }
        title: { type: string }
        instructions: { type: [string, 'null'] }
        allowedSubmissionTypes: { type: array, items: { type: string, enum: [file, github_url, live_url] } }
        maxScore: { type: number }
        rubric: { type: array, items: { type: object, properties: { criterion: { type: string }, weight: { type: number }, maxPoints: { type: number } } } }
        dueDate: { type: [string, 'null'], format: date, description: Resolved from batch start + dueOffsetDays }
        isMandatory: { type: boolean }
    Submission:
      type: object
      properties:
        id: { type: integer, format: int64 }
        taskId: { type: integer, format: int64 }
        enrollmentId: { type: integer, format: int64 }
        version: { type: integer }
        submissionType: { type: string, enum: [file, github_url, live_url] }
        fileUrl: { type: [string, 'null'], description: Signed URL when served }
        urlValue: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
        status: { type: string, enum: [submitted, under_review, approved, changes_requested, rejected] }
        submittedAt: { type: string, format: date-time }
        review: { oneOf: [{ $ref: '#/components/schemas/SubmissionReview' }, { type: 'null' }] }
    SubmissionReview:
      type: object
      properties:
        id: { type: integer, format: int64 }
        submissionId: { type: integer, format: int64 }
        reviewerName: { type: string }
        rubricScores: { type: array, items: { type: object, properties: { criterion: { type: string }, points: { type: number }, maxPoints: { type: number } } } }
        totalScore: { type: [number, 'null'] }
