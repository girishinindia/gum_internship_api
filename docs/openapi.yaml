  /orders/me:
    get:
      tags: [Commerce]
      summary: My orders
      x-required-roles: [student]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Order' } }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
  /orders/{orderId}:
    get:
      tags: [Commerce]
      summary: Order detail (owner only)
      x-required-roles: [student]
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Order' } }
  /orders/{orderId}/invoice:
    get:
      tags: [Commerce]
      summary: Signed URL for GST invoice PDF
      x-required-roles: [student]
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { $ref: '#/components/responses/UploadUrlResponse' }
  /orders/{orderId}/refund-request:
    post:
      tags: [Commerce]
      summary: Request refund (goes to finance queue)
      x-required-roles: [student]
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 10 }
      responses:
        '201':
          description: Requested
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/Refund' } }
  /coupons/validate:
    post:
      tags: [Commerce]
      summary: Preview coupon discount for an internship
      x-required-roles: [student]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, internshipId]
              properties:
                code: { type: string }
                internshipId: { type: integer, format: int64 }
      responses:
        '200':
          description: Validation result (valid=false carries reason, still 200)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/CouponValidation' } }
  /payments/razorpay/webhook:
    post:
      tags: [Commerce]
      summary: 'Public: Razorpay webhook (HMAC-verified, idempotent). Events: payment.captured, payment.failed, refund.processed'
      security: []
      parameters:
        - { name: X-Razorpay-Signature, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, description: Raw Razorpay event payload }
      responses:
        '200': { description: 'Acknowledged (always 200 for valid signatures, even on no-op replays)' }
        '401': { description: Bad signature }

