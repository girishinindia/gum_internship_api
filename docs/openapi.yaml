                            status: { type: string, enum: [present, late, absent] }
                            joinedAt: { type: [string, 'null'], format: date-time }
    post:
      tags: [Live Sessions]
      summary: Manually mark/override attendance (bulk)
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: liveSessionId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [records]
              properties:
                records:
                  type: array
                  items:
                    type: object
                    required: [enrollmentId, status]
                    properties:
                      enrollmentId: { type: integer, format: int64 }
                      status: { type: string, enum: [present, late, absent] }
      responses:
        '200': { $ref: '#/components/responses/OkMessage' }

  # ============================================================ COMMERCE
  /orders:
