      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollmentId, submissionType]
              properties:
                enrollmentId: { type: integer, format: int64 }
                submissionType: { type: string, enum: [file, github_url, live_url] }
