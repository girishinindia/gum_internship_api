  # ============================================================ LIVE SESSIONS
  /batches/{batchId}/live-sessions:
    parameters:
      - { name: batchId, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Live Sessions]
      summary: Sessions of a batch (instructor or enrolled student)
      x-required-roles: [student, instructor, moderator, super_admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { type: array, items: { $ref: '#/components/schemas/LiveSession' } }
    post:
      tags: [Live Sessions]
      summary: Schedule session (instructor pastes Zoom/Meet link in v1)
      x-required-roles: [instructor, moderator, super_admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, title, joinUrl, scheduledStart, scheduledEnd]
              properties:
                provider: { type: string, enum: [zoom, google_meet] }
                title: { type: string }
                joinUrl: { type: string }
                meetingId: { type: string }
                passcode: { type: string }
                lessonId: { type: integer, format: int64 }
                scheduledStart: { type: string, format: date-time }
                scheduledEnd: { type: string, format: date-time }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/LiveSession' } }
  /live-sessions/{liveSessionId}:
    patch:
      tags: [Live Sessions]
      summary: Update/cancel session or attach recordingLessonId
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: liveSessionId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                joinUrl: { type: string }
                scheduledStart: { type: string, format: date-time }
                scheduledEnd: { type: string, format: date-time }
                status: { type: string, enum: [scheduled, live, completed, cancelled] }
                recordingLessonId: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties: { data: { $ref: '#/components/schemas/LiveSession' } }
  /live-sessions/{liveSessionId}/join:
    get:
      tags: [Live Sessions]
      summary: Get join URL (window start−15m..end); records attendance present
      x-required-roles: [student]
      parameters:
        - { name: liveSessionId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: enrollmentId, in: query, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: Join info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          joinUrl: { type: string }
                          passcode: { type: [string, 'null'] }
        '409': { description: 'TOO_EARLY or SESSION_ENDED', content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
  /live-sessions/{liveSessionId}/attendance:
    get:
      tags: [Live Sessions]
      summary: Attendance list for a session
      x-required-roles: [instructor, moderator, super_admin]
      parameters:
        - { name: liveSessionId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            enrollmentId: { type: integer, format: int64 }
